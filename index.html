<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Batch Gainer</title>
</head>

<body style="font-family: Arial; padding: 20px; background:#1F1F1F; color:#FFC500;">

  <h2>batch .wav gainer by ellectroniqa</h2>

  <input id="gain" type="number" step="0.1" value="2.0"
    style="background:#1F1F1F; color:#FFC500; border:1px solid #FFC500;"
  />

  <br><br>

  <div id="dropzone" style="
    width: 320px;
    height: 120px;
    border: 2px dashed #FFC500;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom: 20px;
    color:#FFC500;
  ">
    Drop WAV files here
  </div>

  <button id="start"
    style="background:#1F1F1F; color:#FFC500; border:1px solid #FFC500;"
  >
    Start
  </button>

  <p id="status">waiting for your files</p>

  <!-- small info line -->
  <p style="font-size:10px; opacity:0.7; margin-top:-10px;">
    hard clipping -1 1 implemented
  </p>

  <!-- progress bar -->
  <div style="width:320px; height:10px; border:1px solid #FFC500; margin-top:10px;">
    <div id="bar" style="height:100%; width:0%; background:#FFC500;"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
